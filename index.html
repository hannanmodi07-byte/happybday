
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday, TASNIM 💗💐</title>

<style>
body {
  margin: 0;
  text-align: center;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #ff758c, #ff7eb3, #fad0c4);
  background-size: 400% 400%;
  animation: gradientMove 10s ease infinite;
  color: white;
  overflow-x: hidden;
  transition: transform 0.3s ease;
}

body.pulse {
  animation: gradientMove 10s ease infinite, beat 0.8s ease-in-out infinite;
}

@keyframes gradientMove {
  0% { background-position: 0% 50%; }
  50% { background-position: 100% 50%; }
  100% { background-position: 0% 50%; }
}

@keyframes beat {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.03); }
}

h1 { margin-top: 40px; }

.photo {
  width: 250px;
  height: 250px;
  border-radius: 20px;
  object-fit: cover;
  margin-top: 20px;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

#message {
  max-width: 600px;
  margin: 20px auto;
  line-height: 1.6;
  border-right: 2px solid white;
  padding-right: 5px;
  animation: blink 0.7s infinite;
}

@keyframes blink {
  50% { border-color: transparent; }
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  background: white;
  color: #ff4b5c;
}

#surprise {
  display: none;
  margin-top: 10px;
}

.heart {
  position: fixed;
  bottom: -10px;
  color: red;
  animation: float 5s linear infinite;
  text-shadow: 0 0 10px red, 0 0 20px pink;
  transition: transform 0.2s ease, text-shadow 0.2s ease;
}

.heart.beat {
  transform: scale(1.6);
  text-shadow: 0 0 20px red, 0 0 40px pink, 0 0 60px hotpink;
}

@keyframes float {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}
</style>
</head>

<body>

<h1>Happy Birthday, TASNIM 💗💐</h1>

<img src="img1.png?v=100" class="photo">

<p id="message"></p>

<button onclick="showSurprise()">Tap for a surprise 🎁</button>
<div id="surprise">can we goon everyday? 😏</div>

<audio id="music" loop>
  <source src="aud.mp3" type="audio/mpeg">
</audio>

<button onclick="toggleMusic()">Play Music 🎵</button>

<script>

// 💬 TEXT
const text =  `I know I'm sensitive and sometimes a little jealous,
but you never left me.
You stayed, you understood me, and you gave your best to make things right.

And honestly… that means everything to me.

No matter how far we are from each other,
distance doesn’t change how I feel about you.
If anything, it makes me realize even more
how important you are in my life.

I might not always be perfect,
but one thing I’m sure about is this—
I will never stop choosing you.

I don’t care how long it takes,
I don’t care how hard it gets,
I’ll prove to you, again and again,
that what I feel for you is real.

Because I know…
I won’t find anyone like you in this universe.

You’re not just special,
you’re my person.

And one day,
I’ll make all of this worth it.

Until then…
just stay with me 🥀`;
let i = 0;

function typeEffect() {
  if (i < text.length) {
    document.getElementById("message").innerHTML += 
      text.charAt(i) === "\n" ? "<br>" : text.charAt(i);
    i++;
    setTimeout(typeEffect, 35);
  }
}

window.onload = () => {
  setTimeout(typeEffect, 1000);
};

// 🎵 MUSIC + BACKGROUND PULSE
const music = document.getElementById("music");
let playing = false;

function toggleMusic() {
  if (!playing) {
    music.play();
    document.body.classList.add("pulse");
  } else {
    music.pause();
    document.body.classList.remove("pulse");
  }
  playing = !playing;
}

// 💕 HEARTS
const hearts = [];

setInterval(() => {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";
  document.body.appendChild(heart);
  hearts.push(heart);

  setTimeout(() => {
    heart.remove();
    hearts.shift();
  }, 5000);
}, 500);

// 💓 HEART BEAT SYNC
setInterval(() => {
  if (!music.paused) {
    hearts.forEach(h => h.classList.add("beat"));
    setTimeout(() => {
      hearts.forEach(h => h.classList.remove("beat"));
    }, 200);
  }
}, 800);

// 🎁 SURPRISE
function showSurprise() {
  document.getElementById("surprise").style.display = "block";
}

</script>

</body>
</html>
