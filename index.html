<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Tasnim ❤️</title>

<style>
body {
  margin: 0;
  text-align: center;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(to right, #ff9a9e, #fad0c4);
  color: white;
  overflow-x: hidden;
}

h1 {
  margin-top: 40px;
}

#message {
  font-size: 1.1em;
  max-width: 600px;
  margin: 20px auto;
  border-right: 2px solid white;
  padding-right: 5px;
  animation: blink 0.7s infinite;
}

@keyframes blink {
  50% { border-color: transparent; }
}

.photo {
  width: 250px;
  height: 250px;
  border-radius: 20px;
  object-fit: cover;
  margin-top: 20px;
  box-shadow: 0 0 20px rgba(0,0,0,0.3);
}

.heart {
  position: fixed;
  bottom: -10px;
  color: red;
  animation: float 5s linear infinite;
}

@keyframes float {
  0% { transform: translateY(0); opacity: 1; }
  100% { transform: translateY(-100vh); opacity: 0; }
}

button {
  margin-top: 20px;
  padding: 10px 20px;
  border-radius: 20px;
  border: none;
  background: white;
  color: #ff4b5c;
}

#surprise {
  display: none;
  margin-top: 10px;
}
</style>
</head>

<body>

<h1>Happy Birthday, Tasnim ❤️</h1>

<!-- ✅ ONLY YOUR IMAGE -->
<img src="img1.png?v=5" class="photo">

<!-- 💬 Typing -->
<p id="message"></p>

<!-- 🎁 Surprise -->
<button onclick="showSurprise()">Tap for a surprise 🎁</button>
<div id="surprise">can we goon everyday? 😏</div>

<!-- 🎵 Music -->
<audio id="music" loop>
  <source src="Mymusic.mp3" type="audio/mpeg">
</audio>

<button onclick="document.getElementById('music').play()">
  Play Music 🎵
</button>

<script>

// 💬 Message
const text = `Happy Birthday, Tasnim ❤️

It’s been more than two and a half years…
and somehow, you still manage to annoy me every single day.

You say “anyway” like it solves everything,
you act like you don’t care,
and yet… you’re the one I think about the most.

My dishwasher 😒❤️

I know I'm sensitive and sometimes a little jealous,
but you never left me.
You stayed, you understood me, and you gave your best to make things right.

No matter how far we are,
distance doesn’t matter to me.

I’ll always choose you ❤️`;

let i = 0;

function typeEffect() {
  if (i < text.length) {
    document.getElementById("message").innerHTML += 
      text.charAt(i) === "\n" ? "<br>" : text.charAt(i);
    i++;
    setTimeout(typeEffect, 40);
  }
}

window.onload = () => {
  setTimeout(typeEffect, 1000);
};

// 💕 Hearts
setInterval(() => {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 20 + 10) + "px";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 5000);
}, 500);

// 🎁 Surprise
function showSurprise() {
  document.getElementById("surprise").style.display = "block";
}

</script>

</body>
</html>
