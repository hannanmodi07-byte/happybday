<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday Tasnim ❤️</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      text-align: center;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      color: white;
      overflow-x: hidden;
    }

    h1 {
      margin-top: 40px;
      font-size: 2.8em;
    }

    #message {
      font-size: 1.2em;
      max-width: 600px;
      margin: 20px auto;
      line-height: 1.6;
      border-right: 3px solid white;
      padding-right: 5px;
      animation: blink 0.7s infinite;
    }

    @keyframes blink {
      50% { border-color: transparent; }
    }

    .slideshow {
      margin: 20px auto;
      width: 250px;
      height: 250px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    .slideshow img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .heart {
      position: fixed;
      bottom: -10px;
      color: red;
      animation: float 5s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-100vh); opacity: 0; }
    }

    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 1em;
      border: none;
      border-radius: 20px;
      background: white;
      color: #ff4b5c;
      cursor: pointer;
    }

    #surprise {
      display: none;
      margin-top: 15px;
      font-size: 1.2em;
    }
  </style>
</head>

<body>

  <h1>Happy Birthday, Tasnim ❤️</h1>

  <!-- 📸 Slideshow -->
  <div class="slideshow">
    <img id="slide" src="img.png">
  </div>

  <!-- 💬 Typing Message -->
  <p id="message"></p>

  <!-- 🎁 Surprise -->
  <button onclick="showSurprise()">Tap for a surprise 🎁</button>
  <div id="surprise">can we goon everyday? 😏</div>

  <!-- 🎵 Music -->
  <audio id="music" loop>
    <source src="aud.mp3" type="audio/mpeg">
  </audio>

  <button onclick="document.getElementById('music').play()">
    Play Music 🎵
  </button>

  <script>
    const text = `Happy Birthday, Tasnim ❤️

I know I'm sensitive and sometimes a little jealous,
but you never left me.
You stayed, you understood me, and you gave your best to make things right.

And honestly… that means everything to me.

No matter how far we are from each other,
distance doesn’t change how I feel about you.
If anything, it makes me realize even more
how important you are in my life.

I might not always be perfect,
but one thing I’m sure about is this—
I will never stop choosing you.

I don’t care how long it takes,
I don’t care how hard it gets,
I’ll prove to you, again and again,
that what I feel for you is real.

Because I know…
I won’t find anyone like you in this universe.

You’re not just special,
you’re *my* person.

And one day,
I’ll make all of this worth it.

Until then…
just stay with me ❤️`;

    let index = 0;
    const speed = 40;

    function typeEffect() {
      if (index < text.length) {
        document.getElementById("message").innerHTML += 
          text.charAt(index) === "\n" ? "<br>" : text.charAt(index);
        index++;
        setTimeout(typeEffect, speed);
      }
    }

    window.onload = () => {
      setTimeout(typeEffect, 1500);
    };

    // 💕 Floating hearts
    setInterval(() => {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "❤️";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = (Math.random() * 20 + 10) + "px";
      document.body.appendChild(heart);

      setTimeout(() => heart.remove(), 5000);
    }, 500);

    // 📸 Slideshow
    const images = ["img.png", "img2.png"];
    let i = 0;

    setInterval(() => {
      i = (i + 1) % images.length;
      document.getElementById("slide").src = images[i];
    }, 3000);

    // 🎁 Surprise
    function showSurprise() {
      document.getElementById("surprise").style.display = "block";
    }
  </script>

</body>
</html>
