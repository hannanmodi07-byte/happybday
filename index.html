<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Happy Birthday Tasnim ❤️</title>

  <style>
    body {
      margin: 0;
      padding: 0;
      text-align: center;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(to right, #ff9a9e, #fad0c4);
      color: white;
      overflow-x: hidden;
    }

    h1 {
      margin-top: 40px;
      font-size: 2.8em;
    }

    #message {
      font-size: 1.2em;
      max-width: 600px;
      margin: 20px auto;
      line-height: 1.6;
      border-right: 3px solid white;
      padding-right: 5px;
      animation: blink 0.7s infinite;
    }

    @keyframes blink {
      50% { border-color: transparent; }
    }

    /* 📸 Slideshow */
    .slideshow {
      margin: 20px auto;
      width: 250px;
      height: 250px;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 0 20px rgba(0,0,0,0.3);
    }

    .slideshow img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    /* 💕 Hearts */
    .heart {
      position: fixed;
      bottom: -10px;
      color: red;
      animation: float 5s linear infinite;
    }

    @keyframes float {
      0% { transform: translateY(0); opacity: 1; }
      100% { transform: translateY(-100vh); opacity: 0; }
    }

    /* 🎁 Button */
    button {
      margin-top: 20px;
      padding: 10px 20px;
      font-size: 1em;
      border: none;
      border-radius: 20px;
      background: white;
      color: #ff4b5c;
      cursor: pointer;
    }

    #surprise {
      display: none;
      margin-top: 15px;
      font-size: 1.2em;
    }
  </style>
</head>

<body>

  <h1>Happy Birthday, Tasnim ❤️</h1>

  <!-- 📸 Slideshow -->
  <div class="slideshow">
    <img id="slide" src="img.png">
  </div>

  <!-- 💬 Typing Message -->
  <p id="message"></p>

  <!-- 🎁 Surprise -->
  <button onclick="showSurprise()">Tap for a surprise 🎁</button>
  <div id="surprise">You are my favorite person in the whole world 💖</div>

  <!-- 🎵 Music -->
  <audio autoplay loop>
    <source src="aud.mp3" type="audio/mpeg">
  </audio>

  <script>
    // 💬 Typing text
    const text = `I know I'm sensitive and sometimes a little jealous,
but you never left me.
You stayed, you understood me, and you gave your best to make things right.

I swear, I won’t find anyone like you in this universe.
You’re truly one of a kind, and I’m so lucky to have you.

On your special day, I just want to say…
I love you more than words can express 💖`;

    let index = 0;
    const speed = 40;

    function typeEffect() {
      if (index < text.length) {
        document.getElementById("message").innerHTML += 
          text.charAt(index) === "\n" ? "<br>" : text.charAt(index);
        index++;
        setTimeout(typeEffect, speed);
      }
    }

    // delay start
    window.onload = () => {
      setTimeout(typeEffect, 2000);
    };

    // 💕 Floating hearts
    setInterval(() => {
      const heart = document.createElement("div");
      heart.className = "heart";
      heart.innerHTML = "❤️";
      heart.style.left = Math.random() * 100 + "vw";
      heart.style.fontSize = (Math.random() * 20 + 10) + "px";
      document.body.appendChild(heart);

      setTimeout(() => heart.remove(), 5000);
    }, 500);

    // 📸 Slideshow (uses your existing images)
    const images = ["img.png", "img2.png"];
    let i = 0;

    setInterval(() => {
      i = (i + 1) % images.length;
      document.getElementById("slide").src = images[i];
    }, 3000);

    // 🎁 Surprise
    function showSurprise() {
      document.getElementById("surprise").style.display = "block";
    }
  </script>

</body>
</html>
